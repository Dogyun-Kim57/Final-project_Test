{% extends "base.html" %}

{% block content %}

<h2>게시판</h2>

<form action="/board/create" method="post" enctype="multipart/form-data" class="board-form">
  <input name="title" placeholder="제목">
  <textarea name="content"></textarea>
  <input type="file" name="files" multiple>
  <button>등록</button>
</form>

{% for post in posts %}
<div class="post-item">
  <h3>{{ post.title }}</h3>
  <p>{{ post.content }}</p>
</div>
{% endfor %}

{% endblock %}
