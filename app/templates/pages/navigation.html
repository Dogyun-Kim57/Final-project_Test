{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/navigation.css') }}">
{% endblock %}

{% block content %}

<div class="page-header">
  <h2>운전 경로 추천</h2>
  <p>출발지와 도착지를 선택하면 실제 도로 경로와 주변 CCTV 위험도를 분석합니다.</p>
</div>

<section class="route-search-card">
  <div class="route-input-group">
    <label>출발지</label>
    <input id="startInput" type="text" placeholder="예: 서울역">
  </div>

  <div class="route-input-group">
    <label>도착지</label>
    <input id="endInput" type="text" placeholder="예: 강남역">
  </div>

  <button id="searchRouteBtn" type="button">경로 검색</button>
</section>

<section class="route-layout">
  <div class="map-card">
    <div id="map"></div>
  </div>

  <aside class="route-panel">
    <h3>경로 분석 결과</h3>

    <div class="info-box">
      <span>출발지</span>
      <strong id="startName">-</strong>
    </div>

    <div class="info-box">
      <span>도착지</span>
      <strong id="endName">-</strong>
    </div>

    <div class="route-metric-grid">
      <div>
        <span>거리</span>
        <strong id="distance">-</strong>
      </div>

      <div>
        <span>예상 시간</span>
        <strong id="duration">-</strong>
      </div>

      <div>
        <span>주변 CCTV</span>
        <strong id="nearbyCctvCount">-</strong>
      </div>

      <div>
        <span>정체 위험도</span>
        <strong id="riskLevel">-</strong>
      </div>
    </div>

    <div class="comment-box">
      <span>분석 코멘트</span>
      <p id="routeComment">출발지와 도착지를 선택한 뒤 경로를 검색하세요.</p>
    </div>
  </aside>
</section>

{% endblock %}

{% block extra_js %}
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_map_js_key }}&libraries=services"></script>

<script>
window.__googleMapsReady = false;
window.initGoogleAutocomplete = function () {
  window.__googleMapsReady = true;
  window.dispatchEvent(new Event("google-maps-ready"));
};
</script>

<script type="module" src="{{ url_for('static', filename='js/pages/navigation.js') }}"></script>

<script
  src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&loading=async&libraries=places&callback=initGoogleAutocomplete"
  async defer>
</script>
{% endblock %}
